<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TypoBlaster HUD Components</title>
  <link rel="stylesheet" href="./typoblaster-ui.css" />
</head>
<body>
  <main class="component-page">
    <h1>HUD Components</h1>

    <section class="hud-bar demo">
      <div class="hud-stat"><span>Score</span><strong>000000</strong></div>
      <div class="hud-stat"><span>Combo</span><strong>x00</strong></div>
      <div class="hud-stat"><span>Wave</span><strong>∞</strong></div>
      <div class="hud-stat"><span>Threat</span><strong>LOW</strong></div>
      <div class="hud-stat danger"><span>Lives</span><strong>♥ ♥ ♥</strong></div>
    </section>

    <section class="component-grid">
      <div class="panel-card">
        <h2>Score Popup</h2>
        <div class="score-popup">+250</div>
      </div>

      <div class="panel-card">
        <h2>Combo Badge</h2>
        <div class="combo-badge">Keyboard Wizard x12</div>
      </div>

      <div class="panel-card">
        <h2>Damage Warning</h2>
        <div class="damage-warning">ENEMY BREACHED</div>
      </div>

      <div class="panel-card">
        <h2>Pause Badge</h2>
        <div class="pause-badge">PAUSED</div>
      </div>
    </section>
  </main>
</body>
</html>
