<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TypoBlaster Start Screen</title>
  <link rel="stylesheet" href="./typoblaster-ui.css" />
</head>
<body>
  <main class="screen-centered">
    <section class="title-card">
      <p class="eyebrow">Keyboard Wizard Presents</p>
      <h1>TypoBlaster</h1>
      <p class="subtitle">A tiny arcade game where every key becomes ammo.</p>

      <div class="menu-stack">
        <button class="retro-button primary">Start Game</button>
        <button class="retro-button">How to Play</button>
        <button class="retro-button secondary">Settings</button>
      </div>

      <div class="instruction-strip">
        <span>Type letters</span>
        <span>Blast goblins</span>
        <span>Survive forever</span>
      </div>
    </section>
  </main>
</body>
</html>
