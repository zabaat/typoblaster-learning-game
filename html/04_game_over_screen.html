<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TypoBlaster Game Over</title>
  <link rel="stylesheet" href="./typoblaster-ui.css" />
</head>
<body>
  <main class="screen-centered">
    <section class="modal-card game-over-card">
      <p class="eyebrow danger-text">Run Complete</p>
      <h1>Game Over</h1>

      <div class="final-score-block">
        <span>Final Score</span>
        <strong>48,920</strong>
      </div>

      <div class="stat-list">
        <div><span>Longest Combo</span><strong>x22</strong></div>
        <div><span>Letters Fired</span><strong>318</strong></div>
        <div><span>Accuracy</span><strong>84%</strong></div>
        <div><span>Level Reached</span><strong>9</strong></div>
      </div>

      <div class="menu-stack">
        <button class="retro-button primary">Play Again</button>
        <button class="retro-button secondary">Back to Title</button>
      </div>
    </section>
  </main>
</body>
</html>
